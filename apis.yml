description: >-
  Tower International was a global manufacturer of engineered structural metal
  components and assemblies for the automotive industry, primarily serving
  original equipment manufacturers (OEMs). The company supplied body-structure
  stampings, frame and chassis structures, and complex welded assemblies for
  cars, crossovers, pickups, and SUVs. Tower International was acquired by
  Autokiniton Global Group in 2019 and merged with L&W Group to form the
  second largest Body-in-White and vehicle frame supplier in North America.
  As a private manufacturing company with no public developer API offering,
  Tower International does not expose public REST or web APIs.
